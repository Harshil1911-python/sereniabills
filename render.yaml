services:
  - type: web
    name: sereniabills
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: "False"
    disk:
      name: serenia-data
      mountPath: /opt/render/project/src/instance
      sizeGB: 1
