{% extends "base.html" %}
{% block title %}{{ 'Edit' if supplier else 'Add' }} Supplier{% endblock %}
{% block page_title %}{{ 'Edit' if supplier else 'Add' }} Supplier{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-7">
  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <span><i class="bi bi-truck me-2"></i>{{ 'Edit Supplier' if supplier else 'Add New Supplier' }}</span>
      <a href="{{ url_for('suppliers') }}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a>
    </div>
    <div class="card-body">
      <form method="POST">
        <div class="row g-3">
          <div class="col-12"><label class="form-label">Supplier Name *</label><input type="text" name="name" class="form-control" required value="{{ supplier.name if supplier else '' }}"></div>
          <div class="col-md-6"><label class="form-label">Contact Person</label><input type="text" name="contact_person" class="form-control" value="{{ supplier.contact_person or '' if supplier else '' }}"></div>
          <div class="col-md-6"><label class="form-label">Phone</label><input type="text" name="phone" class="form-control" value="{{ supplier.phone or '' if supplier else '' }}"></div>
          <div class="col-md-6"><label class="form-label">Email</label><input type="email" name="email" class="form-control" value="{{ supplier.email or '' if supplier else '' }}"></div>
          <div class="col-12"><label class="form-label">Address</label><textarea name="address" class="form-control" rows="2">{{ supplier.address or '' if supplier else '' }}</textarea></div>
          <div class="col-12"><label class="form-label">Notes</label><textarea name="notes" class="form-control" rows="2">{{ supplier.notes or '' if supplier else '' }}</textarea></div>
        </div>
        <div class="d-flex gap-2 mt-3">
          <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>{{ 'Update' if supplier else 'Add Supplier' }}</button>
          <a href="{{ url_for('suppliers') }}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div></div>
{% endblock %}
