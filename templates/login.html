<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — SereniaBills</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body class="login-wrapper">
<div class="login-card">
  <div class="login-header">
    <div class="login-logo"><i class="bi bi-receipt-cutoff"></i></div>
    <div class="login-title">SereniaBills</div>
    <div class="login-subtitle">Point of Sale & Inventory Management</div>
  </div>
  <div class="login-box">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show mb-3" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="POST">
      <div class="mb-4">
        <label class="form-label"><i class="bi bi-person me-1"></i>Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label"><i class="bi bi-lock me-1"></i>Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
      </div>
      <button type="submit" class="login-btn"><i class="bi bi-box-arrow-in-right me-2"></i>Sign In</button>
    </form>
    <div class="text-center mt-4" style="color:rgba(255,255,255,.3); font-size:12px;">
      Default: <strong style="color:rgba(255,255,255,.5)">admin</strong> / <strong style="color:rgba(255,255,255,.5)">admin123</strong>
    </div>
  </div>
  <div class="text-center mt-4" style="color:rgba(255,255,255,.2); font-size:12px;">
    &copy; 2025 SereniaBills — Built for modern retail
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
