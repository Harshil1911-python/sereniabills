{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block page_title %}Change Password{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5 col-md-7">
    <div class="card">
      <div class="card-header d-flex align-items-center gap-2">
        <i class="bi bi-lock-fill" style="color:var(--brand-accent)"></i>
        Change Password — {{ current_user.username }}
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Current Password</label>
            <input type="password" name="current_password" class="form-control" required
                   placeholder="Enter your current password">
          </div>
          <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" name="new_password" id="newPw" class="form-control" required
                   placeholder="Min 6 characters" minlength="6">
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm New Password</label>
            <input type="password" name="confirm_password" id="confirmPw" class="form-control" required
                   placeholder="Repeat new password">
            <div id="pwMatch" style="font-size:12px;margin-top:4px"></div>
          </div>
          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg me-1"></i>Update Password
            </button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('confirmPw').addEventListener('input', function() {
  const match = this.value === document.getElementById('newPw').value;
  const el = document.getElementById('pwMatch');
  el.textContent = match ? '✅ Passwords match' : '❌ Passwords do not match';
  el.style.color = match ? 'var(--success)' : 'var(--danger)';
});
</script>
{% endblock %}
